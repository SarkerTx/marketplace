{% extends 'base.html' %} {% block content %}
<h2>My Orders</h2>
{% for order in orders %}
<div class="card mb-2">
  <div class="card-body">
    <h5>Order #{{ order.id }} – {{ order.get_status_display }}</h5>
    <p>{{ order.created|date }} – ${{ order.total_price }}</p>
    <a href="{% url 'order_detail' order.id %}" class="btn btn-sm btn-primary"
      >View</a
    >
  </div>
</div>
{% empty %}
<p>No orders yet.</p>
{% endfor %} {% endblock %}
